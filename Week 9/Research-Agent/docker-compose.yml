version: '3.8'

services:
  backend:
    build: ./backend
    container_name: research_agent_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    volumes:
      - ./backend:/app

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_research
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
  frontend:
    build: ./frontend
    container_name: sql_agent_frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app         # Syncs live code
      - /app/node_modules

volumes:
  ollama_data: