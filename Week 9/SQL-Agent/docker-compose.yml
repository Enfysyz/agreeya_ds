version: '3.8'

services:
  # 1. The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: mock_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: northwind

    volumes:
      - ./db_init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  # 2. The Ollama AI Engine
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU Support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 3. The LangGraph Backend
  backend:
    build: ./backend
    container_name: sql_agent_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - ollama

volumes:
  ollama_data: