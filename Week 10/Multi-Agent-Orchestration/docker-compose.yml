version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_multi_agent
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU Support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  backend:
    build: ./backend
    container_name: multi_agent_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: research_agent_frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app # Syncs live code
      - /app/node_modules

volumes:
  ollama_data:
